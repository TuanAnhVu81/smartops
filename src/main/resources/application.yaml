spring:
  application:
    name: SmartOps API

  # ── Database (MySQL) ──────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smartops_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ──────────────────────────────────────────
  jpa:
    hibernate:
      # validate: Hibernate only checks schema, DOES NOT auto-create tables — managed by Flyway
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Flyway (Database Migration) ───────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # Allow running Flyway on an existing DB

# ── Application Custom Properties ────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}   # Default: 24 hours (in milliseconds)

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Swagger / OpenAPI ─────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
